
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sortable List</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0e;
      --surface:   #171717;
      --border:    #2a2a2a;
      --accent:    #c8f55a;
      --accent-dim:#8aad2e;
      --text:      #f0ede6;
      --muted:     #6b6b6b;
      --drag-over: #1e2a0d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.6rem);
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── List container ── */
    #sortable-list {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Each item ── */
    .list-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: grab;
      user-select: none;
      transition: background 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .list-item:active { cursor: grabbing; }

    .list-item:hover {
      border-color: var(--accent-dim);
      background: #1c1c1c;
    }

    /* ── Index badge ── */
    .item-index {
      min-width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--border);
      border-radius: 4px;
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    /* ── Drag handle ── */
    .handle {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 2px;
      opacity: 0.3;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .handle span {
      display: block;
      width: 18px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
    }
    .list-item:hover .handle { opacity: 0.8; }

    /* ── Item text ── */
    .item-text {
      flex: 1;
      font-size: 0.92rem;
      letter-spacing: 0.01em;
    }

    /* ── Dragging state ── */
    .list-item.dragging {
      opacity: 0.3;
      border-color: var(--accent);
    }

    /* ── Drop-zone highlight ── */
    .list-item.drag-over {
      background: var(--drag-over);
      border-color: var(--accent);
    }

    .list-item.drag-over .item-index {
      background: var(--accent);
      color: #000;
    }

    /* ── Ghost (floating card while dragging) ── */
    #drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 18px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.92rem;
      color: var(--text);
      box-shadow: 0 12px 40px rgba(200,245,90,0.15), 0 4px 12px rgba(0,0,0,0.6);
      max-width: 560px;
      white-space: nowrap;
      transform: rotate(-1.5deg) scale(1.03);
      transition: opacity 0.08s;
    }
    #drag-ghost.visible { opacity: 1; }

    /* ── Add item controls ── */
    .add-row {
      width: 100%;
      max-width: 560px;
      margin-top: 24px;
      display: flex;
      gap: 10px;
    }

    .add-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    .add-row input::placeholder { color: var(--muted); }
    .add-row input:focus { border-color: var(--accent-dim); }

    .add-row button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 14px 22px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }
    .add-row button:hover { background: #d4ff6a; }
    .add-row button:active { transform: scale(0.97); }

    /* ── Hint ── */
    .hint {
      margin-top: 32px;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── Subtle grid bg ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    header, #sortable-list, .add-row, .hint { position: relative; z-index: 1; }
  </style>
</head>
<body>

  <header>
    <h1>Sort<span>able</span></h1>
    <p>Drag items to reorder &nbsp;·&nbsp; No server required</p>
  </header>

  <ul id="sortable-list" aria-label="Sortable list"></ul>

  <div class="add-row">
    <input type="text" id="new-item-input" placeholder="Add a new item…" maxlength="80" />
    <button id="add-btn">+ Add</button>
  </div>

  <p class="hint">↕ drag &amp; drop to reorder &nbsp;·&nbsp; order is saved in your browser</p>

  <!-- Ghost element that follows the cursor -->
  <div id="drag-ghost"></div>

<script>
  // ── Initial data (edit freely) ──────────────────────────────────────────────
  const DEFAULT_ITEMS = [
    '<a href="https://google.com">Google Home>',
    "Write project documentation",
    "Set up GitHub Actions CI",
    "Review pull requests",
    "Update dependencies",
    "Write unit tests",
    "Deploy to GitHub Pages",
  ];

  // ── State ───────────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'sortable_list_items';
  let items = loadItems();
  let dragSrcIndex = null;

  // ── DOM refs ─────────────────────────────────────────────────────────────────
  const list   = document.getElementById('sortable-list');
  const input  = document.getElementById('new-item-input');
  const addBtn = document.getElementById('add-btn');
  const ghost  = document.getElementById('drag-ghost');

  // ── Persistence ──────────────────────────────────────────────────────────────
  function loadItems() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) return JSON.parse(stored);
    } catch (_) {}
    return [...DEFAULT_ITEMS];
  }

  function saveItems() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (_) {}
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function render() {
    list.innerHTML = '';
    items.forEach((text, i) => {
      const li = document.createElement('li');
      li.className = 'list-item';
      li.draggable = true;
      li.dataset.index = i;
      li.innerHTML = `
        <span class="item-index">${i + 1}</span>
        <span class="handle"><span></span><span></span><span></span></span>
        <span class="item-text">${escHtml(text)}</span>
      `;
      attachDragEvents(li, i);
      list.appendChild(li);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Drag events ──────────────────────────────────────────────────────────────
  function attachDragEvents(li, i) {
    li.addEventListener('dragstart', e => {
      dragSrcIndex = i;
      li.classList.add('dragging');
      // Custom ghost image
      ghost.textContent = items[i];
      ghost.classList.add('visible');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setDragImage(new Image(), 0, 0); // hide default ghost
    });

    li.addEventListener('dragend', () => {
      li.classList.remove('dragging');
      ghost.classList.remove('visible');
      clearDragOver();
    });

    li.addEventListener('dragenter', e => {
      e.preventDefault();
      clearDragOver();
      li.classList.add('drag-over');
    });

    li.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });

    li.addEventListener('dragleave', () => {
      li.classList.remove('drag-over');
    });

    li.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIndex === null || dragSrcIndex === i) return;
      // Reorder
      const moved = items.splice(dragSrcIndex, 1)[0];
      items.splice(i, 0, moved);
      dragSrcIndex = null;
      saveItems();
      render();
    });
  }

  function clearDragOver() {
    list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  }

  // ── Ghost follows cursor ──────────────────────────────────────────────────────
  document.addEventListener('dragover', e => {
    ghost.style.left = (e.clientX + 16) + 'px';
    ghost.style.top  = (e.clientY - 14) + 'px';
  });

  // ── Add item ──────────────────────────────────────────────────────────────────
  function addItem() {
    const val = input.value.trim();
    if (!val) return;
    items.push(val);
    saveItems();
    render();
    input.value = '';
    input.focus();
    // Scroll to bottom
    list.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  addBtn.addEventListener('click', addItem);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  // ── Init ──────────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
